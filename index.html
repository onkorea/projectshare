<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>로또 히스토리 · 번호 만들기</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
        background: #111;
        color: #eee;
        line-height: 1.45;
        padding: 1rem;
        max-width: 720px;
        margin-inline: auto;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.5rem;
      }
      .hint {
        font-size: 0.8rem;
        color: #888;
        margin-bottom: 1rem;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        align-items: center;
      }
      .ball {
        display: inline-flex;
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        font-weight: 700;
        background: #fff;
        color: #111;
      }
      .ball.b {
        background: #f5a623;
        color: #111;
      }
      .ball.plus {
        background: transparent;
        color: #666;
        width: 1rem;
        font-size: 0.7rem;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0 0 1rem;
        max-height: 45vh;
        overflow: auto;
        border: 1px solid #333;
        border-radius: 8px;
      }
      li button {
        width: 100%;
        text-align: left;
        padding: 0.65rem 0.75rem;
        border: none;
        border-bottom: 1px solid #2a2a2a;
        background: #1a1a1a;
        color: inherit;
        font: inherit;
        cursor: pointer;
      }
      li button:hover {
        background: #252525;
      }
      li button.on {
        background: #2a3a2a;
      }
      li:last-child button {
        border-bottom: none;
      }
      .detail {
        border: 1px solid #333;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
        background: #1a1a1a;
      }
      .detail h2 {
        font-size: 1rem;
        margin: 0 0 0.5rem;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
      button.gen {
        font: inherit;
        font-weight: 600;
        padding: 0.5rem 0.85rem;
        border-radius: 6px;
        border: none;
        background: #3d7cff;
        color: #fff;
        cursor: pointer;
      }
      button.gen.alt {
        background: #333;
        color: #eee;
      }
      .out {
        margin-top: 0.75rem;
        font-size: 0.85rem;
        color: #aaa;
      }
      .game {
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <h1>로또 6/45</h1>
    <p class="hint">
      아래 목록은 <strong>예시 히스토리</strong>입니다. 회차를 누르면 당첨 번호가 보이고, 자동으로 한 게임이 생성됩니다. 실제 당첨은
      <a href="https://www.dhlottery.co.kr/" style="color: #8af">동행복권</a>에서 확인하세요.
    </p>

    <ul id="list" aria-label="회차 목록"></ul>

    <div class="detail" id="detail">
      <h2 id="title">회차를 선택하세요</h2>
      <div class="row" id="win"></div>
      <div class="actions">
        <button type="button" class="gen" id="b1">번호 1게임 더 만들기</button>
        <button type="button" class="gen alt" id="b5">5게임 만들기</button>
      </div>
      <div class="out" id="out"></div>
    </div>

    <script>
      (function () {
        function rnd32(s) {
          return function () {
            s |= 0;
            s = (s + 0x6d2b79f5) | 0;
            var t = Math.imul(s ^ (s >>> 15), 1 | s);
            t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        }
        function pick6(r) {
          var p = [],
            i,
            j,
            k,
            a = [];
          for (i = 1; i <= 45; i++) p.push(i);
          for (k = 0; k < 6; k++) {
            j = (r() * p.length) | 0;
            a.push(p.splice(j, 1)[0]);
          }
          a.sort(function (x, y) {
            return x - y;
          });
          var b = [];
          for (i = 1; i <= 45; i++) if (a.indexOf(i) < 0) b.push(i);
          return { n: a, bonus: b[(r() * b.length) | 0] };
        }
        function prevDay(d) {
          var w = d.getUTCDay();
          if (w === 6) return new Date(d - 3 * 864e5);
          if (w === 3) return new Date(d - 4 * 864e5);
          return new Date(d - 864e5);
        }
        function fmt(d) {
          return (
            d.getUTCFullYear() +
            "-" +
            String(d.getUTCMonth() + 1).padStart(2, "0") +
            "-" +
            String(d.getUTCDate()).padStart(2, "0")
          );
        }
        function build(N) {
          var rows = [],
            draw = 1000 + N,
            d = Date.UTC(2026, 3, 8),
            r,
            t,
            i;
          for (i = 0; i < N; i++) {
            r = rnd32((draw * 7919 + i) >>> 0);
            t = pick6(r);
            rows.push({ draw: draw, date: fmt(new Date(d)), numbers: t.n, bonus: t.bonus });
            draw--;
            d = +prevDay(new Date(d));
          }
          return rows.sort(function (a, b) {
            return b.date.localeCompare(a.date) || b.draw - a.draw;
          });
        }

        var history = build(48);
        var listEl = document.getElementById("list");
        var titleEl = document.getElementById("title");
        var winEl = document.getElementById("win");
        var outEl = document.getElementById("out");
        var cur = history[0];

        function balls(nums, bonus) {
          var h = "";
          nums.forEach(function (n) {
            h += '<span class="ball">' + n + "</span>";
          });
          h += '<span class="ball plus">+</span><span class="ball b">' + bonus + "</span>";
          return h;
        }
        function cryptoR() {
          var u = new Uint32Array(1);
          crypto.getRandomValues(u);
          return u[0] / 4294967296;
        }
        function oneGame() {
          var r =
            typeof crypto !== "undefined" && crypto.getRandomValues
              ? cryptoR
              : rnd32((Date.now() ^ (Math.random() * 1e9)) >>> 0);
          var p = [],
            a = [],
            i,
            j,
            k;
          for (i = 1; i <= 45; i++) p.push(i);
          for (k = 0; k < 6; k++) {
            j = (r() * p.length) | 0;
            a.push(p.splice(j, 1)[0]);
          }
          a.sort(function (x, y) {
            return x - y;
          });
          return a;
        }
        function showGames(arr) {
          outEl.innerHTML = "";
          var lab = document.createElement("div");
          lab.innerHTML = "<strong>만든 번호</strong>";
          outEl.appendChild(lab);
          arr.forEach(function (g) {
            var row = document.createElement("div");
            row.className = "game row";
            g.forEach(function (n) {
              var s = document.createElement("span");
              s.className = "ball";
              s.textContent = String(n);
              row.appendChild(s);
            });
            outEl.appendChild(row);
          });
        }
        function renderDetail() {
          if (!cur) return;
          titleEl.textContent = cur.draw + "회 · " + cur.date;
          winEl.innerHTML = balls(cur.numbers, cur.bonus);
        }
        function gen(n) {
          var g = [],
            i;
          for (i = 0; i < n; i++) g.push(oneGame());
          showGames(g);
        }
        function select(h) {
          cur = h;
          document.querySelectorAll("#list button").forEach(function (b) {
            b.classList.toggle("on", b.dataset.d == h.draw);
          });
          renderDetail();
          gen(1);
        }

        history.forEach(function (h) {
          var li = document.createElement("li");
          var b = document.createElement("button");
          b.type = "button";
          b.dataset.d = h.draw;
          b.textContent = h.date + " · " + h.draw + "회";
          b.addEventListener("click", function () {
            select(h);
          });
          li.appendChild(b);
          listEl.appendChild(li);
        });

        document.getElementById("b1").addEventListener("click", function () {
          if (cur) gen(1);
        });
        document.getElementById("b5").addEventListener("click", function () {
          if (cur) gen(5);
        });

        if (cur) select(cur);
      })();
    </script>
  </body>
</html>
