<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>야디지북</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- ① 골프장 검색 -->
      <section id="screen-1" class="screen active">
        <div class="topbar">
          <button type="button" class="btn-icon" id="s1-menu" aria-label="메뉴">☰</button>
          <div style="flex: 1"></div>
          <button type="button" class="btn-outline" id="s1-record">🏌 기록</button>
        </div>
        <div class="s1-brand">
          <span class="logo" aria-hidden="true">⛳</span>
          <div>
            <h2>야디지북</h2>
            <p>골프장 코스 정보 및 야디지 데이터</p>
          </div>
        </div>
        <div class="search-wrap">
          <input type="search" id="search-input" placeholder="골프장명 또는 지역 검색…" autocomplete="off" />
        </div>
        <div class="chips">
          <button type="button" class="chip fav" data-filter="fav">★ 즐겨찾기</button>
          <button type="button" class="chip on" data-filter="전체">전체</button>
          <button type="button" class="chip" data-filter="수도권">수도권</button>
          <button type="button" class="chip" data-filter="충청">충청</button>
          <button type="button" class="chip" data-filter="영남">영남</button>
          <button type="button" class="chip" data-filter="호남">호남</button>
        </div>
        <p class="count-line" id="result-count">총 0개 골프장</p>
        <div class="course-list" id="course-list"></div>
      </section>

      <!-- ② 클럽 소개 + 홀 맵 썸네일 -->
      <section id="screen-2" class="screen">
        <div class="topbar">
          <button type="button" class="btn-icon" id="s2-back" aria-label="뒤로">‹</button>
          <h1 id="s2-title">클럽 상세</h1>
          <button type="button" class="btn-outline" id="s2-record">🏌 기록</button>
        </div>
        <div class="s2-body">
          <h2 class="club-title" id="club-name">—</h2>
          <div class="tag-row">
            <span class="tag green" id="tab-badge">실크코스</span>
            <span class="tag yellow" id="club-diff">난이도 중</span>
          </div>
          <p class="contact" id="club-contact">—</p>
          <div class="tabs" id="tabs-nine"></div>
          <div class="desc-box" id="club-desc">—</div>
          <div class="hole-grid-title">홀별 코스 이미지</div>
          <div class="hole-grid" id="hole-grid"></div>
        </div>
      </section>

      <!-- ③ 라운드 설정 · 코스별 기록 진입 -->
      <section id="screen-3" class="screen">
        <div class="topbar s3-topbar">
          <button type="button" class="btn-icon" id="s3-back" aria-label="뒤로">‹</button>
          <div style="text-align: center">
            <h1 style="margin: 0">새 라운드</h1>
            <p class="sub" style="margin: 0">코스 설정</p>
          </div>
          <div class="progress-dots" aria-hidden="true">
            <span class="on"></span><span class="on"></span><span></span>
          </div>
        </div>
        <div class="s3-body">
          <div class="date-pill" id="round-date">—</div>
          <div class="section-label">골프장 선택</div>
          <div class="course-pick-list" id="round-course-list"></div>
          <div class="section-label">코스 구성 선택</div>
          <div class="nine-grid">
            <div class="nine-col">
              <label>전반 (1~9홀)</label>
              <div class="nine-btns">
                <button type="button" class="nine-front" data-nine="silk">실크코스</button>
                <button type="button" class="nine-front" data-nine="lake">레이크코스</button>
                <button type="button" class="nine-front" data-nine="valley">밸리코스</button>
              </div>
            </div>
            <div class="nine-col">
              <label>후반 (10~18홀)</label>
              <div class="nine-btns">
                <button type="button" class="nine-back" data-nine="silk">실크코스</button>
                <button type="button" class="nine-back" data-nine="lake">레이크코스</button>
                <button type="button" class="nine-back" data-nine="valley">밸리코스</button>
              </div>
            </div>
          </div>
          <div class="summary-banner" id="round-summary">—</div>
          <div class="section-label">티 선택</div>
          <div class="tee-row">
            <button type="button" class="tee-pick" data-tee="black">블랙</button>
            <button type="button" class="tee-pick" data-tee="blue">블루</button>
            <button type="button" class="tee-pick on" data-tee="white">화이트</button>
            <button type="button" class="tee-pick" data-tee="red">레드</button>
          </div>
          <button type="button" class="btn-primary-full" id="btn-start-round">스코어 입력 시작 →</button>
        </div>
      </section>

      <!-- ④ 맵 위 타수 기록 -->
      <section id="screen-4" class="screen screen-4">
        <div class="topbar s3-topbar">
          <button type="button" class="btn-icon" id="s4-close" aria-label="종료">✕</button>
          <h1 id="s4-hole-title" style="margin: 0; text-align: center; font-size: 0.95rem">1번 홀 Par 5</h1>
          <span style="font-size: 0.72rem; color: #888; text-align: right">종료</span>
        </div>
        <div class="s4-map-wrap">
          <div class="s4-map"></div>
          <div id="rings-host"></div>
          <div class="tees-row" aria-hidden="true">
            <span class="tee-dot red"></span>
            <span class="tee-dot yellow"></span>
            <span class="tee-dot white"></span>
            <span class="tee-dot blue"></span>
            <span class="tee-dot black"></span>
          </div>
          <div class="pin-flag" aria-hidden="true"></div>
          <div class="stroke-badge" id="stroke-count">현재 0타</div>
          <div class="s4-float">
            <div class="course-dd">
              <div class="big" id="s4-course-line">—</div>
              <div id="s4-hole-line">실크 1홀 ▼</div>
            </div>
            <div class="dist-box">
              <div>보정거리 <span class="big-r" id="d-adj">—</span></div>
              <div>수평거리 <span style="color: #dc2626; font-weight: 700" id="d-horiz">—</span></div>
              <div>높낮이 <span style="color: #dc2626; font-weight: 700" id="d-elev">—</span></div>
              <div>PAR <strong id="d-par">—</strong></div>
            </div>
          </div>
          <div class="shots-layer" id="shots-layer"></div>
        </div>
        <div class="s4-bottom">
          <button type="button" id="btn-undo">↺ 되돌리기</button>
          <button type="button" class="hole-in" id="btn-hole-in">⛳ 홀인</button>
          <button type="button" id="btn-reset">⟳ 초기화</button>
        </div>
      </section>
    </div>
    <script src="app.js"></script>
  </body>
</html>
